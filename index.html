<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PANAX — Content Board</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f4f0; --surface:#fff; --surface2:#f0efe9;
  --border:#e2e0d8; --border2:#ccc9be;
  --text:#1a1a1a; --muted:#6b6b6b; --dim:#aaa;
  --accent:#2952ff; --accent-light:#eef1ff;
  --green:#16a34a; --green-bg:#dcfce7;
  --amber:#d97706; --amber-bg:#fef3c7;
  --red:#dc2626; --red-bg:#fee2e2;
  --blue:#2563eb; --blue-bg:#dbeafe;
  --purple:#7c3aed; --purple-bg:#ede9fe;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
header{background:var(--surface);border-bottom:2px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:.08em;display:flex;align-items:center;gap:10px;}
.logo-badge{background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;}
.hdr-right{display:flex;align-items:center;gap:10px;}
.dot-row{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);}
.dot{width:8px;height:8px;border-radius:50%;background:var(--dim);display:inline-block;}
.dot.ok{background:var(--green);}

/* BUTTONS */
.btn{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;padding:9px 20px;border-radius:8px;border:2px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{background:var(--surface2);border-color:#888;}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none;}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-primary:hover:not(:disabled){background:#1a3de0;border-color:#1a3de0;}
.btn-sm{font-size:12px;font-weight:700;padding:6px 14px;border-radius:6px;}
.btn-ghost{border-color:transparent;background:transparent;}
.btn-ghost:hover{background:var(--surface2);border-color:var(--border);}
.btn-icon{background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;transition:all .15s;font-size:18px;color:var(--dim);}
.btn-icon:hover{background:var(--amber-bg);}
.btn-icon.saved{color:var(--amber);}

/* LAYOUT */
.app{max-width:1200px;margin:0 auto;padding:20px 24px;display:flex;flex-direction:column;gap:20px;}

/* TABS */
.main-tabs{background:var(--surface);border-bottom:2px solid var(--border);padding:0 24px;display:flex;gap:0;}
.mtab{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;padding:14px 20px;border:none;background:none;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;display:flex;align-items:center;gap:8px;}
.mtab:hover{color:var(--text);}
.mtab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;}
.tab-badge{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:1px 7px;border-radius:10px;display:none;}
.tab-badge.show{display:inline;}

/* FREE INPUT SECTION */
.free-input-section{background:var(--surface);border:2px solid var(--accent);border-radius:12px;padding:20px 24px;}
.free-input-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.free-input-desc{font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.5;}
.free-textarea{width:100%;min-height:120px;padding:12px 16px;border:2px solid var(--border2);border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.6;color:var(--text);background:var(--surface2);resize:vertical;transition:border-color .15s;}
.free-textarea:focus{outline:none;border-color:var(--accent);}
.free-textarea::placeholder{color:var(--dim);}
.free-input-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;}
.char-count{font-size:12px;color:var(--dim);}
.char-count.enough{color:var(--green);font-weight:600;}

/* NEWS SECTION */
.news-section{background:var(--surface);border:2px solid var(--border);border-radius:12px;overflow:hidden;}
.news-toolbar{padding:14px 20px;border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.toolbar-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.period-sel{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;padding:7px 14px;border:2px solid var(--border2);border-radius:8px;background:var(--surface);color:var(--text);cursor:pointer;}
.ftabs{display:flex;gap:4px;flex-wrap:wrap;}
.ftab{font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;border:2px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;}
.ftab:hover{border-color:var(--text);color:var(--text);}
.ftab.on{background:var(--text);border-color:var(--text);color:#fff;}

/* CATEGORY */
.cat-section{padding:20px;border-bottom:1px solid var(--border);}
.cat-section:last-child{border-bottom:none;}
.cat-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.cat-badge{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:5px 12px;border-radius:5px;}
.cb-release    {background:var(--blue-bg);color:var(--blue);}
.cb-community  {background:var(--purple-bg);color:var(--purple);}
.cb-controversy{background:var(--red-bg);color:var(--red);}
.cb-sale       {background:var(--green-bg);color:var(--green);}
.cb-other      {background:var(--surface2);color:var(--muted);border:1px solid var(--border2);}

/* NEWS CARD */
.ncard{background:var(--surface2);border:2px solid var(--border);border-radius:10px;padding:18px;transition:border-color .15s;}
.ncard:hover{border-color:var(--accent);}
.ncard-top{display:flex;align-items:flex-start;gap:10px;}
.ncard-main{flex:1;}
.ncard-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.nsource{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.ntime{font-size:11px;color:var(--dim);}
.ntitle-en{font-size:16px;font-weight:700;line-height:1.4;margin-bottom:3px;}
.ntitle-kr{font-size:13px;color:var(--muted);line-height:1.4;margin-bottom:10px;}
.ndesc{font-size:14px;line-height:1.65;color:var(--text);margin-bottom:10px;}
.nlink{font-size:13px;color:var(--accent);font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:4px;margin-bottom:12px;}
.nlink:hover{text-decoration:underline;}

/* PASTE AREA per card */
.paste-area{margin-top:12px;border-top:1px solid var(--border);padding-top:12px;}
.paste-label{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.paste-textarea{width:100%;min-height:80px;padding:10px 14px;border:2px solid var(--border2);border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;line-height:1.6;color:var(--text);background:var(--surface);resize:vertical;transition:border-color .15s;}
.paste-textarea:focus{outline:none;border-color:var(--accent);}
.paste-textarea::placeholder{color:var(--dim);}
.paste-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.paste-chars{font-size:11px;color:var(--dim);}
.paste-chars.ok{color:var(--green);font-weight:600;}

/* CONTENT OUTPUT */
.content-box{background:var(--surface);border:2px solid var(--accent);border-radius:12px;padding:24px;display:none;}
.content-box.show{display:block;}
.content-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;}
.content-title-row{flex:1;}
.content-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;}
.content-source{font-size:13px;color:var(--muted);margin-top:4px;}
.content-actions{display:flex;gap:8px;flex-shrink:0;align-items:flex-start;}

/* PERSONA CARDS */
.personas{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.pcard{border:2px solid var(--border);border-radius:10px;padding:18px;}
.pcard-sammy{border-color:#93c5fd;background:#eff6ff;}
.pcard-ledy{border-color:#c4b5fd;background:#faf5ff;}
.pcard-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.pname{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;}
.ptag{font-size:12px;color:var(--muted);}
.pcard-hdr-right{margin-left:auto;}
.copy-btn{font-size:12px;font-weight:700;padding:5px 12px;border-radius:6px;border:2px solid var(--border2);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .15s;}
.copy-btn:hover{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.copy-btn.copied{background:var(--green-bg);border-color:var(--green);color:var(--green);}

/* CONTENT BLOCK */
.content-block{margin-bottom:12px;}
.content-en{font-size:15px;line-height:1.8;color:var(--text);}
.content-kr{font-size:13px;line-height:1.7;color:var(--muted);margin-top:4px;padding-left:12px;border-left:2px solid var(--border2);}
.content-headline{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:10px;}
.content-headline-kr{font-size:14px;color:var(--muted);font-weight:500;margin-bottom:14px;padding-left:12px;border-left:2px solid var(--border2);}

/* COMMENTS */
.comments-sec{border-top:2px solid var(--border);padding-top:18px;}
.comments-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.cmt{display:flex;gap:12px;margin-bottom:10px;padding:14px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);}
.cmt-av{width:38px;height:38px;border-radius:50%;background:var(--border2);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--muted);flex-shrink:0;}
.cmt-user{font-size:13px;font-weight:700;margin-bottom:4px;}
.cmt-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;margin-left:6px;}
.cb-agree   {background:var(--green-bg);color:var(--green);}
.cb-disagree{background:var(--red-bg);color:var(--red);}
.cb-funny   {background:var(--amber-bg);color:var(--amber);}
.cmt-en{font-size:14px;line-height:1.55;margin-bottom:3px;}
.cmt-kr{font-size:12px;color:var(--muted);line-height:1.5;padding-left:10px;border-left:2px solid var(--border2);}

/* BOOKMARKS TAB */
.bm-section{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:20px 24px;}
.bm-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.bm-list{display:flex;flex-direction:column;gap:10px;}
.bm-card{background:var(--surface2);border:2px solid var(--border);border-radius:10px;padding:16px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.bm-info{flex:1;}
.bm-title{font-size:15px;font-weight:700;margin-bottom:3px;}
.bm-title-kr{font-size:13px;color:var(--muted);margin-bottom:6px;}
.bm-meta{font-size:12px;color:var(--dim);display:flex;align-items:center;gap:8px;}
.bm-actions{display:flex;gap:6px;flex-shrink:0;}

/* SAVED CONTENT TAB */
.saved-section{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:20px 24px;}
.saved-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.saved-list{display:flex;flex-direction:column;gap:12px;}
.saved-card{background:var(--surface2);border:2px solid var(--border);border-radius:10px;padding:16px;}
.saved-card-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:10px;}
.saved-card-title{font-size:14px;font-weight:700;line-height:1.4;}
.saved-card-meta{font-size:11px;color:var(--dim);margin-top:3px;}
.saved-card-actions{display:flex;gap:6px;flex-shrink:0;}
.saved-preview{font-size:13px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;}
.overlay.hidden{display:none;}
.modal{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:28px;width:460px;max-width:90vw;}
.modal-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:6px;}
.modal-desc{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:16px;}
.mlabel{font-size:13px;font-weight:700;display:block;margin:10px 0 5px;}
.minput{width:100%;background:var(--surface2);border:2px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;transition:border-color .15s;}
.minput:focus{outline:none;border-color:var(--accent);}
.mnote{font-size:12px;color:var(--amber);background:var(--amber-bg);padding:10px 14px;border-radius:6px;margin:12px 0;line-height:1.6;}
.mactions{display:flex;gap:8px;margin-top:16px;}

/* SAVED CONTENT MODAL */
.saved-modal{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:28px;width:800px;max-width:95vw;max-height:85vh;overflow-y:auto;}

/* UTILS */
.spinner{display:inline-block;width:18px;height:18px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .3s ease both;}
.empty-state{text-align:center;padding:48px 24px;color:var(--muted);}
.empty-state strong{display:block;font-size:16px;font-weight:700;color:var(--text);margin-bottom:8px;}
.sec-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.sec-title b{color:var(--text);}
</style>
</head>
<body>

<!-- API MODAL -->
<div class="overlay hidden" id="modal">
  <div class="modal">
    <div class="modal-title">⚙ PANAX Board Setup</div>
    <div class="modal-desc">Anthropic API 키를 입력해주세요. 브라우저에만 저장됩니다.</div>
    <label class="mlabel">Anthropic API Key <span style="color:var(--red)">*필수</span></label>
    <input class="minput" type="password" id="k-ant" placeholder="sk-ant-...">
    <div class="mnote">🔒 키는 브라우저 로컬스토리지에만 저장됩니다. GitHub 파일에 포함되지 않습니다.</div>
    <div class="mactions">
      <button class="btn btn-primary" style="flex:1" onclick="saveKeys()">저장하고 시작</button>
      <button class="btn" onclick="closeModal()">나중에</button>
    </div>
  </div>
</div>

<!-- SAVED CONTENT MODAL -->
<div class="overlay hidden" id="saved-modal">
  <div class="saved-modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <div class="modal-title" style="margin:0;">📦 저장된 컨텐츠</div>
      <button class="btn btn-sm btn-ghost" onclick="closeSavedModal()">✕ 닫기</button>
    </div>
    <div id="saved-modal-body"></div>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">PANAX <span class="logo-badge">BOARD</span></div>
  <div class="hdr-right">
    <div class="dot-row">
      <span class="dot" id="d-ant"></span>Claude
    </div>
    <button class="btn btn-sm" onclick="openModal()">⚙ API Key</button>
  </div>
</header>

<!-- TABS -->
<div class="main-tabs">
  <button class="mtab on" onclick="switchTab('news',this)">📰 뉴스 피드</button>
  <button class="mtab" onclick="switchTab('bookmarks',this)">🔖 북마크 <span class="tab-badge" id="bm-badge"></span></button>
  <button class="mtab" onclick="switchTab('saved',this)">📦 저장된 컨텐츠 <span class="tab-badge" id="saved-badge"></span></button>
</div>

<div class="app">

  <!-- ══ NEWS TAB ══ -->
  <div id="tab-news">

    <!-- FREE INPUT -->
    <div class="free-input-section">
      <div class="free-input-title">✍ 기사 직접 입력</div>
      <div class="free-input-desc">RSS 피드 외에도 직접 찾은 기사를 여기에 붙여넣으면 바로 컨텐츠로 만들 수 있어요. (최소 100자 이상)</div>
      <textarea class="free-textarea" id="free-text" placeholder="기사 제목, 본문 내용을 여기에 붙여넣어 주세요..." oninput="onFreeInput()"></textarea>
      <div class="free-input-footer">
        <span class="char-count" id="free-chars">0자</span>
        <button class="btn btn-primary" id="free-gen-btn" disabled onclick="generateFromFree()">📱 컨텐츠 생성</button>
      </div>
    </div>

    <!-- NEWS FEED -->
    <div class="news-section">
      <div class="news-toolbar">
        <div class="toolbar-left">
          <select class="period-sel" id="period">
            <option value="1">최근 1일</option>
            <option value="3">최근 3일</option>
            <option value="7">최근 7일</option>
          </select>
          <div class="ftabs">
            <button class="ftab on" onclick="setFilter('all',this)">전체</button>
            <button class="ftab" onclick="setFilter('release',this)">🎮 릴리즈</button>
            <button class="ftab" onclick="setFilter('community',this)">💬 커뮤니티</button>
            <button class="ftab" onclick="setFilter('controversy',this)">⚠️ 논란</button>
            <button class="ftab" onclick="setFilter('sale',this)">🏷 세일</button>
            <button class="ftab" onclick="setFilter('other',this)">📌 기타</button>
          </div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="btn btn-sm btn-ghost" id="cache-btn" onclick="clearNewsCache()" style="color:var(--muted);display:none;" title="캐시된 뉴스 삭제">🗑 캐시 삭제</button>
          <button class="btn btn-primary" id="news-btn" onclick="loadNews()">↻ 뉴스 불러오기</button>
        </div>
      </div>
      <div id="news-container">
        <div class="empty-state">
          <strong>뉴스를 불러와주세요</strong>
          기간 선택 후 '뉴스 불러오기'를 클릭하세요
        </div>
      </div>
    </div>

    <!-- CONTENT OUTPUT (news) -->
    <div class="content-box" id="content-box">
      <div class="content-hdr">
        <div class="content-title-row">
          <div class="content-title">📱 컨텐츠 생성 결과</div>
          <div class="content-source" id="content-source"></div>
        </div>
        <div class="content-actions">
          <button class="btn btn-sm" onclick="saveCurrentContent()">💾 저장</button>
          <button class="btn btn-sm btn-ghost" onclick="closeContent()">✕ 닫기</button>
        </div>
      </div>
      <div id="content-body"></div>
    </div>

  </div>

  <!-- ══ BOOKMARKS TAB ══ -->
  <div id="tab-bookmarks" style="display:none;">
    <div class="bm-section">
      <div class="bm-hdr">
        <div class="sec-title">🔖 <b>저장된 뉴스</b></div>
        <button class="btn btn-sm btn-ghost" style="color:var(--red)" onclick="clearBookmarks()">전체 삭제</button>
      </div>
      <div id="bm-list"></div>
    </div>
    <!-- CONTENT OUTPUT (bookmarks) -->
    <div class="content-box" id="content-box-bm">
      <div class="content-hdr">
        <div class="content-title-row">
          <div class="content-title">📱 컨텐츠 생성 결과</div>
          <div class="content-source" id="content-source-bm"></div>
        </div>
        <div class="content-actions">
          <button class="btn btn-sm" onclick="saveCurrentContentBm()">💾 저장</button>
          <button class="btn btn-sm btn-ghost" onclick="closeContentBm()">✕ 닫기</button>
        </div>
      </div>
      <div id="content-body-bm"></div>
    </div>
  </div>

  <!-- ══ SAVED CONTENT TAB ══ -->
  <div id="tab-saved" style="display:none;">
    <div class="saved-section">

// ── RSS FETCH ──
async function fetchRSS(feed) {
  const proxies = [
    url => `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`,
    url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`
  ];

  // Try rss2json first
  try {
    const res = await fetch(proxies[0](feed.url));
    if (!res.ok) throw new Error('rss2json fail');
    const data = await res.json();
    if (data.status === 'ok' && data.items && data.items.length) {
      return data.items.slice(0, 10).map(item => ({
        title: (item.title || '').trim(),
        link:  (item.link || '').trim(),
        desc:  (item.description || item.content || '')
                 .replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').substring(0, 400),
        source: feed.name,
        pubDate: item.pubDate || ''
      })).filter(i => i.title && i.link);
    }
  } catch {}

  // Fallback proxies
  for (let i = 1; i < proxies.length; i++) {
    try {
      const res = await fetch(proxies[i](feed.url));
      if (!res.ok) continue;
      let xmlText = '';
      if (proxies[i](feed.url).includes('allorigins')) {
        const data = await res.json();
        xmlText = data.contents || '';
      } else {
        xmlText = await res.text();
      }
      if (!xmlText) continue;
      const parser = new DOMParser();
      const doc = parser.parseFromString(xmlText, 'text/xml');
      const items = [...doc.querySelectorAll('item, entry')];
      if (!items.length) continue;
      return items.slice(0, 10).map(item => {
        const title   = item.querySelector('title')?.textContent?.trim() || '';
        const link    = item.querySelector('link')?.textContent?.trim() || item.querySelector('link')?.getAttribute('href') || '';
        const desc    = (item.querySelector('description, summary, content')?.textContent || '')
                          .replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').substring(0, 400);
        const pubDate = item.querySelector('pubDate, published, updated')?.textContent?.trim() || '';
        return { title, link, desc, source: feed.name, pubDate };
      }).filter(i => i.title && i.link);
    } catch {}
  }
  return [];
}

// ── CLAUDE API ──
async function callClaude(system, user, maxTokens) {
  if (!apiKey) { openModal(); throw new Error('API key가 없어요'); }
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: maxTokens || 2000,
      system,
      messages: [{ role:'user', content: user }]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content.map(b => b.text || '').join('');
}

function extractJSON(raw) {
  const match = raw.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('응답에서 JSON을 찾지 못했어요');
  return JSON.parse(match[0]);
}

async function loadNews() {
  if (!apiKey) { openModal(); return; }

  // Load from cache if available
  if (newsCache && newsCache.data && Object.keys(newsCache.data).length) {
    newsData = newsCache.data;
    renderNews();
    document.getElementById('cache-btn').style.display = '';
    showCacheInfo();
    return;
  }

  const btn = document.getElementById('news-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 수집 중...';
  document.getElementById('news-container').innerHTML =
    '<div class="empty-state"><span class="spinner"></span> 실제 뉴스를 수집하고 있어요...</div>';
  closeContent();

  const feedResults = await Promise.all(RSS_FEEDS.map(f => fetchRSS(f).catch(() => [])));
  let allItems = [];
  feedResults.forEach(items => allItems = allItems.concat(items));

  if (!allItems.length) {
    document.getElementById('news-container').innerHTML =
      '<div class="empty-state"><strong>뉴스 수집 실패</strong>RSS 피드를 가져오지 못했어요. 잠시 후 다시 시도해주세요.</div>';
    btn.disabled = false; btn.innerHTML = '↻ 뉴스 불러오기';
    return;
  }

  const period = document.getElementById('period').value;
  const itemsForClaude = allItems.map((it, i) => ({
    idx: i,
    title: it.title,
    desc: it.desc.substring(0, 200),
    source: it.source
  }));

  const CLASSIFY_SYS = `You are a gaming news editor for PANAX, a cross-platform gamer community.
Pick the SINGLE best news item per category from the provided list.
EXCLUDE: sponsored content, product bundle recommendations, "best deal" articles, affiliate-style articles, ads disguised as news.
INCLUDE: genuine news with real editorial value — announcements, controversies, community events, actual sales (not just "buy this").

Categories:
- release: game launches, announcements, delays, DLC, updates
- community: trending discussions, viral moments, community events
- controversy: studio/publisher/game controversies, layoffs, disputes
- sale: genuine limited-time sales, free game offers, subscription additions
- other: industry news, esports, tech, other notable gaming news

For each category, also provide:
- title_kr: natural Korean translation (NOT literal word-for-word — use natural Korean phrasing that conveys the same meaning and tone)

Respond ONLY as valid JSON, no extra text:
{"release":{"idx":N,"title_kr":"..."},"community":{"idx":N,"title_kr":"..."},"controversy":{"idx":N,"title_kr":"..."},"sale":{"idx":N,"title_kr":"..."},"other":{"idx":N,"title_kr":"..."}}`;

  let picks;
  try {
    const raw = await callClaude(CLASSIFY_SYS, `Period: past ${period} day(s). Items: ${JSON.stringify(itemsForClaude)}`, 800);
    picks = extractJSON(raw);
  } catch(e) {
    document.getElementById('news-container').innerHTML =
      `<div class="empty-state"><strong>분류 실패</strong>${e.message}</div>`;
    btn.disabled = false; btn.innerHTML = '↻ 뉴스 불러오기';
    return;
  }

  newsData = {};
  const catIds = ['release','community','controversy','sale','other'];
  catIds.forEach(cat => {
    const pick = picks[cat];
    if (pick === undefined || pick === null) return;
    const idx = typeof pick === 'object' ? pick.idx : pick;
    const title_kr = typeof pick === 'object' ? pick.title_kr : '';
    if (!allItems[idx]) return;
    newsData[cat] = { ...allItems[idx], title_kr: title_kr || allItems[idx].title };
  });

  // Save to cache
  newsCache = { data: newsData, savedAt: Date.now() };
  localStorage.setItem('px_news_cache', JSON.stringify(newsCache));
  document.getElementById('cache-btn').style.display = '';

  renderNews();

    if (diff < 1440) return `${Math.floor(diff/60)}시간 전`;
    return `${Math.floor(diff/1440)}일 전`;
  } catch { return ''; }
}

        <div class="content-block">
          <div class="content-en">${c.outlook}</div>
          <div class="content-kr">${c.outlook_kr || ''}</div>
        </div>
      </div>
    </div>`;
  };

  const commentsHTML = (content.comments || []).map(c => {
    const [cls, label] = typeMap[c.type] || ['',''];
    return `<div class="cmt">
      <div class="cmt-av">${(c.user||'?')[0].toUpperCase()}</div>
      <div style="flex:1;">
        <div class="cmt-user">${c.user}<span class="cmt-badge ${cls}">${label}</span></div>
        <div class="cmt-en">${c.text}</div>
        <div class="cmt-kr">${c.text_kr || ''}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById(bodyId).innerHTML = `
    <div class="personas">
      ${personaHTML('sammy', 'data:image/png;base64,' + SAMMY_IMG, 'Sammy', 'Energetic gaming journalist', 'pcard-sammy')}
      ${personaHTML('ledy',  'data:image/png;base64,' + LEDY_IMG,  'Ledy',  'Thoughtful gaming journalist', 'pcard-ledy')}
    </div>
    <div class="comments-sec">
      <div class="comments-title">💬 가상 커뮤니티 반응</div>
      ${commentsHTML}
    </div>`;
}

function copyPersona(key) {
  const el = document.getElementById('persona-' + key);
  if (!el) return;
  // Copy English text only
  const headlines = el.querySelectorAll('.content-headline');
  const ens = el.querySelectorAll('.content-en');
  let text = '';
  headlines.forEach(h => text += h.textContent + '\n\n');
  ens.forEach(e => text += e.textContent + '\n');
  navigator.clipboard.writeText(text.trim()).then(() => {
    const btn = document.getElementById('copy-' + key);
    btn.textContent = '✓ 복사됨';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

// ── SAVE CONTENT ──
function saveCurrentContent()   { doSaveContent(lastGeneratedContent); }
function saveCurrentContentBm() { doSaveContent(lastGeneratedContentBm); }

function doSaveContent(result) {
  if (!result) { alert('저장할 컨텐츠가 없어요. 먼저 컨텐츠를 생성해주세요.'); return; }
  const { content, kr, news } = result;
  const saved = {
    id: Date.now(),
    savedAt: Date.now(),
    newsTitle: news.title,
    newsSource: news.source,
    content
  };
  savedContents.unshift(saved);
  localStorage.setItem('px_saved', JSON.stringify(savedContents));
  updateBadges();
  alert('저장됐어요! 📦 "저장된 컨텐츠" 탭에서 확인하세요.');
}

function renderSavedList() {
  const list = document.getElementById('saved-list');
  if (!savedContents.length) {
    list.innerHTML = '<div class="empty-state"><strong>저장된 컨텐츠가 없어요</strong>컨텐츠 생성 후 💾 저장 버튼을 눌러보세요!</div>';
    return;
  }
  list.innerHTML = savedContents.map((s, i) => `
    <div class="saved-card fade">
      <div class="saved-card-hdr">
        <div>
          <div class="saved-card-title">${s.newsTitle}</div>
          <div class="saved-card-meta">${s.newsSource || ''} · ${new Date(s.savedAt).toLocaleDateString('ko-KR')}</div>
        </div>
        <div class="saved-card-actions">
          <button class="btn btn-sm btn-primary" onclick="viewSaved(${i})">👁 보기</button>
          <button class="btn btn-sm btn-ghost" style="color:var(--red)" onclick="deleteSaved(${i})">✕</button>
        </div>
      </div>
      <div class="saved-preview">Sammy: ${s.content?.sammy?.headline || ''} — ${s.content?.sammy?.hook || ''}</div>
    </div>`).join('');
}

function viewSaved(i) {
  const s = savedContents[i];
  if (!s) return;
  const modalBody = document.getElementById('saved-modal-body');
  document.getElementById('saved-modal').classList.remove('hidden');
  renderContentHTML(s.content, 'saved-modal-body');
}

function closeSavedModal() { document.getElementById('saved-modal').classList.add('hidden'); }

function deleteSaved(i) {
  if (!confirm('이 컨텐츠를 삭제할까요?')) return;
  savedContents.splice(i, 1);
  localStorage.setItem('px_saved', JSON.stringify(savedContents));
  updateBadges();
  renderSavedList();
}

function clearSavedContents() {
  if (!confirm('저장된 컨텐츠를 모두 삭제할까요?')) return;
  savedContents = [];
  localStorage.setItem('px_saved', JSON.stringify(savedContents));
  updateBadges();
  renderSavedList();
}

function closeContent()   { document.getElementById('content-box').classList.remove('show'); }
function closeContentBm() { document.getElementById('content-box-bm').classList.remove('show'); }

// ── INIT ──
initKeys();
// Load cached news on startup
if (newsCache && newsCache.data && Object.keys(newsCache.data).length) {
  newsData = newsCache.data;
  renderNews();
  document.getElementById('cache-btn').style.display = '';
  showCacheInfo();
}
</script>
</body>
</html>
